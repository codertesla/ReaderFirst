baseURL = 'https://example.com/'
theme = 'ReaderFirst'
themesDir = '../..'
locale = 'en-US'
title = 'ReaderFirst'
enableRobotsTXT = true

[params]
description = 'A minimalist, reading-first Hugo theme optimized for humans and AI agents.'
author = 'ReaderFirst'
# logo = 'images/logo.png'              # uncomment to populate publisher.logo in JSON-LD
# default_og_image = 'images/og.png'    # uncomment for a fallback social share image
# twitter = '@readerfirst'              # uncomment for twitter:site

[taxonomies]
tag = 'tags'
category = 'categories'

[pagination]
pageSize = 10

# Powers the server-side "Related posts" block in single.html.
[related]
  threshold = 80
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = 'tags'
    weight = 100
  [[related.indices]]
    name = 'date'
    weight = 10

[markup]
  [markup.highlight]
    noClasses = false
    style = 'github'
    lineNos = false
    tabWidth = 2

[outputFormats.JSON]
mediaType = 'application/json'
baseName = 'index'

[outputs]
home = ['html', 'rss', 'json']

[menus]
  [[menus.main]]
    name = 'Home'
    pageRef = '/'
    weight = 10

  [[menus.main]]
    name = 'Posts'
    pageRef = '/posts'
    weight = 20

  [[menus.main]]
    name = 'Tags'
    pageRef = '/tags'
    weight = 30

[module]
  [module.hugoVersion]
    extended = false
    min = '0.146.0'
