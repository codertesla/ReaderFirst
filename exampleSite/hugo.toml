baseURL = 'https://example.com/'
title = 'ReaderFirst'
defaultContentLanguage = 'en'
enableRobotsTXT = true

# Load the theme as a Hugo Module. The local `replace` in go.mod points at the
# parent directory so this works without fetching from GitHub during development.
theme = 'github.com/codertesla/ReaderFirst'

[module]
  [[module.imports]]
    path = 'github.com/codertesla/ReaderFirst'

  [module.hugoVersion]
    extended = false
    min = '0.158.0'

# Count CJK characters as words so .WordCount / .ReadingTime are accurate for
# Chinese/Japanese/Korean content (harmless for Latin-only sites).
hasCJKLanguage = true

[languages]
  [languages.en]
    locale = 'en-US'
    label = 'English'
    weight = 1

[params]
description = 'A minimalist, reading-first Hugo theme optimized for humans and AI agents.'
author = 'ReaderFirst'
# Explicit main section for home lists, JSON Feed, and related-post scoping.
mainSections = ['posts']
# logo = 'images/logo.png'              # uncomment to populate publisher.logo in JSON-LD
# default_og_image = 'images/og.png'    # uncomment for a fallback social share image
# twitter = '@readerfirst'              # uncomment for twitter:site

[taxonomies]
tag = 'tags'
category = 'categories'

[pagination]
pageSize = 10

# Powers the server-side "Related posts" block in single.html.
[related]
  threshold = 80
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = 'tags'
    weight = 100
  [[related.indices]]
    name = 'date'
    weight = 10

[markup]
  [markup.highlight]
    # noClasses=false emits Chroma CSS classes; the actual token colors are
    # defined (theme-aware) in assets/css/main.css, so no `style` is set here.
    noClasses = false
    lineNos = false
    tabWidth = 2

[outputFormats.JSON]
mediaType = 'application/json'
baseName = 'index'

[outputs]
home = ['html', 'rss', 'json']

[menus]
  # `identifier` maps to an i18n key (see i18n/*.toml) so menu labels are
  # translated per language; `name` is the fallback when no translation exists.
  # `pageRef` resolves against content paths — keep in sync with [params].mainSections.
  [[menus.main]]
    identifier = 'home'
    name = 'Home'
    pageRef = '/'
    weight = 10

  [[menus.main]]
    identifier = 'posts'
    name = 'Posts'
    pageRef = '/posts/'
    weight = 20

  [[menus.main]]
    identifier = 'tags'
    name = 'Tags'
    pageRef = '/tags/'
    weight = 30

  [[menus.main]]
    identifier = 'categories'
    name = 'Categories'
    pageRef = '/categories/'
    weight = 40
