baseURL = 'https://example.org/'
locale = 'en-US'
title = 'ReaderFirst'

[params]
description = 'A minimalist, reading-first Hugo theme optimized for humans and AI agents.'
author = 'ReaderFirst'
# logo = 'images/logo.png'              # uncomment to populate publisher.logo in JSON-LD
# default_og_image = 'images/og.png'    # uncomment for a fallback social share image
# twitter = '@readerfirst'              # uncomment for twitter:site

[taxonomies]
tag = 'tags'
category = 'categories'

[menus]
  [[menus.main]]
    name = 'Home'
    pageRef = '/'
    weight = 10

  [[menus.main]]
    name = 'Posts'
    pageRef = '/posts'
    weight = 20

  [[menus.main]]
    name = 'Tags'
    pageRef = '/tags'
    weight = 30

[module]
  [module.hugoVersion]
    extended = false
    min = '0.146.0'
