<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    text {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-weight: 700;
      fill: #1a1a1f;
    }
    rect {
      stroke: #1a1a1f;
      fill: none;
    }
    @media (prefers-color-scheme: dark) {
      text {
        fill: #e7e7ec;
      }
      rect {
        stroke: #e7e7ec;
      }
    }
  </style>
  <rect x="15" y="15" width="70" height="70" rx="12" stroke-width="7" />
  <text x="50" y="65" font-size="44" text-anchor="middle">RF</text>
</svg>
